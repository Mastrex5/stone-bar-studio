<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#33e0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66ebff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background geometric elements -->
  <rect x="0" y="0" width="200" height="60" fill="none"/>

  <!-- Stone/brick pattern -->
  <rect x="5" y="15" width="8" height="4" fill="#00d4ff" opacity="0.3"/>
  <rect x="15" y="12" width="6" height="3" fill="#00d4ff" opacity="0.2"/>
  <rect x="25" y="18" width="7" height="3" fill="#00d4ff" opacity="0.25"/>
  <rect x="35" y="14" width="5" height="4" fill="#00d4ff" opacity="0.35"/>

  <!-- Main logo text -->
  <text x="50" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="url(#logoGradient)" filter="url(#glow)">
    STONE BAR
  </text>
  <text x="50" y="42" font-family="Arial, sans-serif" font-size="12" font-weight="300" fill="#b8c5d6">
    STUDIO
  </text>

  <!-- Decorative elements -->
  <circle cx="15" cy="30" r="2" fill="#00d4ff" opacity="0.6"/>
  <circle cx="35" cy="35" r="1.5" fill="#33e0ff" opacity="0.4"/>
  <circle cx="180" cy="20" r="1" fill="#66ebff" opacity="0.5"/>
  <circle cx="185" cy="40" r="1.5" fill="#00d4ff" opacity="0.3"/>
</svg>